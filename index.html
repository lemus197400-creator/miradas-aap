<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miradas Fabulosas</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',sans-serif;background:#3a2628;}
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#2a1c1e;border-top:1px solid #5a3a3e;display:flex;z-index:200;}
    .nav button{flex:1;padding:12px 0 10px;border:none;background:none;cursor:pointer;font-size:10px;color:#9a7a7e;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.5px;font-weight:600;}
    .nav button.active{color:#d4a88a;}
    .nav button .ic{font-size:18px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React,{useState,useEffect,useMemo} from "react";
import {createRoot} from "react-dom/client";
import {initializeApp} from "firebase/app";
import {getFirestore,collection,doc,setDoc,onSnapshot,deleteDoc,updateDoc,addDoc} from "firebase/firestore";

const FB = {apiKey:"AIzaSyBbZvr2t9Bh7ekJCM2OP8O64Cgy6KWYDaY",authDomain:"miradas-fabulosas.firebaseapp.com",projectId:"miradas-fabulosas",storageBucket:"miradas-fabulosas.firebasestorage.app",messagingSenderId:"339425359104",appId:"1:339425359104:web:a0e342f5a87c3169512fe5"};
const db = getFirestore(initializeApp(FB));

const ESTS = ["Dira","Cristina","Katherine","Gabriela","Astrid","Esly","Disponible 7"];
const SVCS = ["Microblading","Powderbrow","Hairstrokes","Extensiones","Pestañas","Depilación","Hilo","Facial","Corte","Tinte","Mechas","Tratamiento","Peinado","Uñas","Otro"];
const HORAS = ["07:00","07:30","08:00","08:30","09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00"];
const PRECIOS = {"Corte":150,"Tinte":300,"Mechas":400,"Tratamiento":200,"Peinado":150,"Microblading":800,"Powderbrow":800,"Hairstrokes":700,"Extensiones":600,"Uñas":150,"Depilación":100,"Facial":250,"Hilo":50,"Pestañas":200,"Otro":0};
const COLORS = {"Dira":"#c9878a","Cristina":"#7bafd4","Katherine":"#6dbf8a","Gabriela":"#d4a44c","Astrid":"#9b7fc4","Esly":"#d47b9a","Disponible 7":"#7bc4b8"};
const USERS = {"Dira":{pin:"1234",rol:"admin"},"Cristina":{pin:"2222",rol:"estilista"},"Katherine":{pin:"3333",rol:"estilista"},"Gabriela":{pin:"4444",rol:"estilista"},"Astrid":{pin:"5555",rol:"estilista"},"Esly":{pin:"6666",rol:"estilista"},"Disponible 7":{pin:"7777",rol:"estilista"}};
const VPREMIO = 8;

const hoy = () => new Date().toISOString().split("T")[0];
const manana = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split("T")[0]; };
const fmt = (f) => { if(!f) return ""; const [y,m,d]=f.split("-"); return d+"/"+m+"/"+y; };
const mkLink = (c,a) => window.location.href.split("?")[0]+"?cita="+c.id+"&accion="+a;

const waMsg = (c) => {
  const svcs = Array.isArray(c.servicios) ? c.servicios.join(", ") : c.servicio;
  const msg = "Hola "+c.cliente+" 😊✨\nTe recordamos tu cita en Miradas Fabulosas 💅\n\n📅 Fecha: "+fmt(c.fecha)+"\n🕐 Hora: "+c.hora+"\n✂️ Servicios: "+svcs+"\n👩 Con: "+c.estilista+"\n\n¿Nos confirmas tu cita?\n\n✅ SÍ, confirmo:\n"+mkLink(c,"confirmar")+"\n\n❌ No puedo ir:\n"+mkLink(c,"cancelar")+"\n\n📅 Necesito reagendar:\n"+mkLink(c,"reagendar")+"\n\n¡Te esperamos! 💕";
  return "https://wa.me/"+c.telefono.replace(/\D/g,"")+"?text="+encodeURIComponent(msg);
};

const waEstrella = (c, visitas) => {
  const msg = "Hola "+c.nombre+" ✨\n¡Sumaste una visita en Miradas Fabulosas!\n\n⭐ Llevas "+visitas+" de "+VPREMIO+" visitas para tu servicio gratis.\n\n¡Gracias por elegirnos! 💕";
  return "https://wa.me/"+c.telefono.replace(/\D/g,"")+"?text="+encodeURIComponent(msg);
};

const defForm = () => ({cliente:"",telefono:"",servicios:[],estilista:ESTS[0],fecha:hoy(),hora:"09:00",nota:"",precio:0,cumpleanos:"",frecuente:false,formula:"",alergias:""});

// Colores del diseño
const C = {
  bg: "#3a2628",
  bgCard: "#2a1c1e",
  bgLight: "#4a3235",
  accent: "#d4a88a",
  accentDark: "#b8896a",
  cream: "#f5ede4",
  creamSoft: "#e8d8cc",
  text: "#f0e0d8",
  textMuted: "#9a7a7e",
  green: "#6dbf8a",
  red: "#e07070",
  border: "#5a3a3e",
};

const inp = {padding:"14px 16px",borderRadius:10,border:"1px solid "+C.border,background:C.bgLight,color:C.text,fontSize:15,width:"100%",outline:"none"};

// ── PANTALLA DE CONFIRMACIÓN PÚBLICA ──────────────────────────
function PantallaConfirmacion({estado, cliente}){
  const e=React.createElement;
  const ok = estado==="confirmada";
  const reag = estado==="reagendar";
  return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}},
    e("div",{style:{background:C.bgCard,borderRadius:20,padding:40,maxWidth:340,border:"1px solid "+C.border}},
      e("div",{style:{fontSize:56,marginBottom:16}}, reag?"📅": ok?"✅":"❌"),
      e("div",{style:{fontSize:20,fontWeight:800,color:C.accent,marginBottom:12,letterSpacing:0.5}},
        reag?"Solicitud Recibida": ok?"¡Cita Confirmada!":"Cita Cancelada"),
      e("div",{style:{fontSize:14,color:C.creamSoft,lineHeight:1.6}},
        reag
          ? "Gracias "+cliente+". Nos pondremos en contacto contigo para coordinar una nueva fecha."
          : "Gracias "+cliente+". Tu respuesta ha sido registrada en Miradas Fabulosas."),
      e("div",{style:{marginTop:24,fontSize:12,color:C.textMuted}},"Miradas Fabulosas • C.C. Mega Centro Zona 7")
    )
  );
}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({onLogin,users}){
  const [sel,setSel]=useState(null);
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const e=React.createElement;

  const press=(d)=>{
    if(pin.length>=4)return;
    const n=pin+d; setPin(n); setErr("");
    if(n.length===4){
      setTimeout(()=>{
        const u=users[sel];
        if(u&&u.pin===n){onLogin(sel,u.rol);setPin("");}
        else{setErr("PIN incorrecto");setPin("");}
      },80);
    }
  };

  return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}},
    e("div",{style:{marginBottom:8,textAlign:"center"}},
      e("div",{style:{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,"+C.accent+","+C.accentDark+")",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:C.bg,fontFamily:"Georgia,serif",letterSpacing:-1}},"MF"),
      e("div",{style:{fontWeight:800,fontSize:20,color:C.accent,marginBottom:2,letterSpacing:1}},"MIRADAS FABULOSAS"),
      e("div",{style:{fontSize:11,color:C.textMuted,letterSpacing:2,textTransform:"uppercase"}},"Sistema de Gestión")
    ),
    e("div",{style:{width:"100%",maxWidth:340,marginTop:32}}),
    !sel
      ? e("div",{style:{width:"100%",maxWidth:340}},
          e("div",{style:{fontWeight:600,fontSize:12,color:C.textMuted,marginBottom:14,textAlign:"center",letterSpacing:1,textTransform:"uppercase"}},"¿Quién eres?"),
          ...Object.keys(users).map(n=>e("button",{key:n,onClick:()=>{setSel(n);setPin("");setErr("");},
            style:{width:"100%",padding:"14px 18px",background:C.bgCard,border:"1px solid "+C.border,borderRadius:12,marginBottom:8,fontSize:14,fontWeight:700,color:C.text,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"border-color 0.2s"}},
            e("div",{style:{width:36,height:36,borderRadius:"50%",background:COLORS[n]||C.accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:15,fontWeight:800,flexShrink:0}},n[0]),
            e("div",{style:{textAlign:"left"}},
              e("div",{style:{color:C.cream}},n),
              e("div",{style:{fontSize:11,color:C.textMuted,fontWeight:400}},users[n].rol==="admin"?"Administradora":"Estilista")
            )
          ))
        )
      : e("div",{style:{width:"100%",maxWidth:300,textAlign:"center"}},
          e("button",{onClick:()=>{setSel(null);setPin("");setErr("");},style:{background:"none",border:"none",color:C.textMuted,fontSize:13,cursor:"pointer",marginBottom:20}},"← Volver"),
          e("div",{style:{width:52,height:52,borderRadius:"50%",background:COLORS[sel]||C.accent,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:20,fontWeight:800}},sel[0]),
          e("div",{style:{fontWeight:700,fontSize:16,color:C.cream,marginBottom:4}},sel),
          e("div",{style:{fontSize:12,color:C.textMuted,marginBottom:28,letterSpacing:0.5}},"Ingresa tu PIN"),
          e("div",{style:{display:"flex",justifyContent:"center",gap:16,marginBottom:12}},
            ...[0,1,2,3].map(i=>e("div",{key:i,style:{width:14,height:14,borderRadius:"50%",background:i<pin.length?C.accent:C.border,transition:"background 0.15s"}}))
          ),
          err&&e("div",{style:{color:C.red,fontSize:13,marginBottom:10,fontWeight:600}},err),
          e("div",{style:{height:12}}),
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}},
            ...[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>
              e("button",{key:i,
                onClick:()=>d==="⌫"?setPin(p=>p.slice(0,-1)):d!==""?press(String(d)):null,
                style:{
                  padding:"22px 0",borderRadius:14,border:"none",
                  background:d==="⌫"?C.red:d===""?"transparent":C.bgCard,
                  color:d==="⌫"?"#fff":C.cream,
                  fontSize:22,fontWeight:700,
                  cursor:d===""?"default":"pointer",
                  border:d!==""&&d!=="⌫"?"1px solid "+C.border:"none",
                  minHeight:60
                }},d)
            )
          )
        )
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [rol,setRol]=useState(null);
  const [users,setUsers]=useState(USERS);
  const [citas,setCitas]=useState([]);
  const [fid,setFid]=useState([]);
  const [gastos,setGastos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sec,setSec]=useState("agenda");
  const [toast,setToast]=useState(null);
  const [confPantalla,setConfPantalla]=useState(null);
  const isAdmin=rol==="admin";

  const [vistaA,setVistaA]=useState("lista");
  const [form,setForm]=useState(defForm());
  const [editId,setEditId]=useState(null);
  const [fFecha,setFFecha]=useState(hoy());

  useEffect(()=>{
    const u1=onSnapshot(collection(db,"citas"),s=>{setCitas(s.docs.map(d=>({...d.data(),id:d.id})));setLoading(false);});
    const u2=onSnapshot(collection(db,"fidelidad"),s=>{setFid(s.docs.map(d=>({...d.data(),id:d.id})));});
    const u3=onSnapshot(collection(db,"gastos"),s=>{setGastos(s.docs.map(d=>({...d.data(),id:d.id})));});
    const u4=onSnapshot(doc(db,"config","usuarios"),s=>{if(s.exists())setUsers(s.data());});
    return()=>{u1();u2();u3();u4();};
  },[]);

  // Manejar confirmación pública (sin login)
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const id=p.get("cita"),ac=p.get("accion");
    if(id&&ac){
      localStorage.setItem("mf_pa",JSON.stringify({id,ac}));
      window.history.replaceState({},"",window.location.pathname);
    }
  },[]);

  useEffect(()=>{
    if(loading)return;
    try{
      const pa=localStorage.getItem("mf_pa");
      if(pa){
        const {id,ac}=JSON.parse(pa);
        const c=citas.find(x=>x.id===id);
        const est=ac==="confirmar"?"confirmada":ac==="cancelar"?"cancelada":"reagendar";
        if(c){
          updateDoc(doc(db,"citas",id),{estado:est,ultimaConfirmacion:new Date().toISOString()});
          setConfPantalla({cita:c,est});
        } else {
          // Cita no cargada aún, mostrar pantalla igualmente
          setConfPantalla({cita:{cliente:""},est});
          updateDoc(doc(db,"citas",id),{estado:est,ultimaConfirmacion:new Date().toISOString()}).catch(()=>{});
        }
        localStorage.removeItem("mf_pa");
      }
    }catch(err){}
  },[loading]);

  const showT=(msg,col=C.accent)=>{setToast({msg,col});setTimeout(()=>setToast(null),3000);};

  const toggleSvc=(svc)=>{
    setForm(f=>{
      const svcs=f.servicios||[];
      const nuevo=svcs.includes(svc)?svcs.filter(s=>s!==svc):[...svcs,svc];
      const precio=nuevo.reduce((s,sv)=>s+(PRECIOS[sv]||0),0);
      return {...f,servicios:nuevo,precio};
    });
  };

  const guardarCita=async()=>{
    if(!form.cliente||!form.telefono||!form.fecha||!form.hora||!(form.servicios||[]).length){
      showT("⚠️ Completa todos los campos",C.red);return;
    }
    const ff=isAdmin?form:{...form,estilista:user};
    try{
      if(editId){
        await updateDoc(doc(db,"citas",editId),ff);
        showT("✓ Cita actualizada");
      } else {
        const id=Date.now().toString();
        await setDoc(doc(db,"citas",id),{...ff,id,estado:"pendiente",confirmaciones:[]});
        showT("✓ Cita guardada");
      }
      setForm(defForm());setEditId(null);setVistaA("lista");
    }catch(err){showT("Error al guardar",C.red);}
  };

  const cambEst=async(id,est)=>{
    const c=citas.find(x=>x.id===id);
    const conf=[...(c?.confirmaciones||[]),{estado:est,hora:new Date().toLocaleTimeString("es-GT",{hour:"2-digit",minute:"2-digit"}),fecha:hoy()}];
    await updateDoc(doc(db,"citas",id),{estado:est,confirmaciones:conf});
    showT(est==="confirmada"?"✅ Confirmada":est==="cancelada"?"❌ Cancelada":est==="reagendar"?"📅 Reagendando...":"↩️ Pendiente",
      est==="confirmada"?C.green:est==="cancelada"?C.red:C.accent);
    if(est==="reagendar"&&c){
      const msg = "Hola "+c.cliente+", vemos que necesitas reagendar. ¿Cuándo te quedaría mejor? 📅";
      window.open("https://wa.me/"+c.telefono.replace(/\D/g,"")+"?text="+encodeURIComponent(msg),"_blank");
    }
  };

  // Registrar visita y crear tarjeta automáticamente si no existe
  const regVisita=async(cl)=>{
    const nv=(cl.visitas||0)+1;
    const gano=nv%VPREMIO===0;
    const hist=[...(cl.historial||[]),{fecha:hoy(),premio:gano}];
    const premios=(cl.premiosGanados||0)+(gano?1:0);
    await updateDoc(doc(db,"fidelidad",cl.id),{visitas:nv,historial:hist,premiosGanados:premios});
    if(gano) showT("🎉 ¡"+cl.nombre+" ganó un servicio gratis!",C.accent);
    else showT("✓ Visita registrada ("+nv%VPREMIO+"/"+VPREMIO+")",C.green);
    // Notificación WhatsApp
    if(cl.telefono) window.open(waEstrella(cl,nv),"_blank");
  };

  const restarVisita=async(cl)=>{
    const nv=Math.max(0,(cl.visitas||1)-1);
    await updateDoc(doc(db,"fidelidad",cl.id),{visitas:nv});
    showT("↩️ Visita corregida",C.textMuted);
  };

  const canjear=async(cl)=>{
    if(!(cl.premiosGanados||0))return;
    await updateDoc(doc(db,"fidelidad",cl.id),{premiosGanados:(cl.premiosGanados||1)-1});
    showT("✓ Premio canjeado",C.accent);
  };

  const crearTarjeta=async(nombre,telefono)=>{
    if(!nombre)return;
    const id=Date.now().toString();
    await setDoc(doc(db,"fidelidad",id),{id,nombre,telefono:telefono||"",visitas:0,historial:[],premiosGanados:0});
    showT("✓ Tarjeta creada",C.green);
  };

  const borrarTarjeta=async(id)=>{
    if(!window.confirm("¿Borrar esta tarjeta de fidelidad?"))return;
    await deleteDoc(doc(db,"fidelidad",id));
    showT("Tarjeta eliminada",C.textMuted);
  };

  // Crear tarjeta automáticamente al completar cita
  const completarCita=async(cita)=>{
    await cambEst(cita.id,"completada");
    const existe=fid.find(f=>f.nombre?.toLowerCase()===cita.cliente?.toLowerCase()||f.telefono===cita.telefono);
    if(!existe){
      await crearTarjeta(cita.cliente,cita.telefono);
    } else {
      await regVisita(existe);
    }
  };

  const e=React.createElement;

  // Pantalla pública de confirmación (sin login)
  if(confPantalla) return e(PantallaConfirmacion,{estado:confPantalla.est,cliente:confPantalla.cita.cliente});

  if(!user) return e(Login,{users,onLogin:(u,r)=>{setUser(u);setRol(r);}});

  // Filtrar citas por fecha y técnica
  const citasFiltradas = citas.filter(c=>{
    const fechaOk = c.fecha===fFecha;
    const estOk = isAdmin || c.estilista===user;
    return fechaOk && estOk;
  }).sort((a,b)=>a.hora>b.hora?1:-1);

  // Citas del día siguiente para confirmaciones
  const citasManana = citas.filter(c=>{
    const estOk = isAdmin || c.estilista===user;
    return c.fecha===manana() && estOk;
  }).sort((a,b)=>a.hora>b.hora?1:-1);

  const Header = e("div",{style:{padding:"14px 20px",background:C.bgCard,borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}},
    e("div",null,
      e("div",{style:{fontWeight:900,fontSize:16,color:C.accent,letterSpacing:1}},"MIRADAS FABULOSAS"),
      e("div",{style:{fontSize:11,color:C.textMuted}},user+(isAdmin?" · Admin":""))
    ),
    e("button",{onClick:()=>{setUser(null);setRol(null);},style:{background:C.bgLight,border:"1px solid "+C.border,padding:"6px 12px",borderRadius:8,color:C.textMuted,fontSize:11,fontWeight:700,cursor:"pointer"}},"Salir")
  );

  // ── SECCIÓN AGENDA ──
  const SecAgenda = e("div",{style:{padding:16}},
    e("div",{style:{display:"flex",gap:8,marginBottom:14}},
      e("button",{onClick:()=>{setVistaA("lista");setEditId(null);setForm(defForm());},
        style:{flex:1,padding:10,borderRadius:10,border:"none",background:vistaA==="lista"?C.accent:C.bgCard,color:vistaA==="lista"?C.bg:C.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}},
        "Ver Agenda"),
      e("button",{onClick:()=>setVistaA("formulario"),
        style:{flex:1,padding:10,borderRadius:10,border:"none",background:vistaA==="formulario"?C.accent:C.bgCard,color:vistaA==="formulario"?C.bg:C.textMuted,fontWeight:700,fontSize:13,cursor:"pointer"}},
        "+ Nueva Cita")
    ),

    vistaA==="lista"
      ? e("div",null,
          // Selector de fecha
          e("div",{style:{display:"flex",gap:8,marginBottom:14,alignItems:"center"}},
            e("button",{onClick:()=>{const d=new Date(fFecha);d.setDate(d.getDate()-1);setFFecha(d.toISOString().split("T")[0]);},
              style:{padding:"10px 14px",borderRadius:10,border:"1px solid "+C.border,background:C.bgCard,color:C.cream,fontSize:18,cursor:"pointer"}},"‹"),
            e("input",{type:"date",value:fFecha,onChange:x=>setFFecha(x.target.value),
              style:{...inp,flex:1,textAlign:"center",cursor:"pointer"}}),
            e("button",{onClick:()=>{const d=new Date(fFecha);d.setDate(d.getDate()+1);setFFecha(d.toISOString().split("T")[0]);},
              style:{padding:"10px 14px",borderRadius:10,border:"1px solid "+C.border,background:C.bgCard,color:C.cream,fontSize:18,cursor:"pointer"}},"›")
          ),
          e("div",{style:{fontSize:12,color:C.textMuted,marginBottom:12,textAlign:"center"}},
            citasFiltradas.length+" cita"+(citasFiltradas.length!==1?"s":"")+" • "+fmt(fFecha)
          ),
          citasFiltradas.length===0
            ? e("div",{style:{textAlign:"center",padding:40,color:C.textMuted,fontSize:14}},"Sin citas este día")
            : citasFiltradas.map(c=>e("div",{key:c.id,style:{background:C.bgCard,padding:14,borderRadius:12,borderLeft:"4px solid "+(COLORS[c.estilista]||C.border),marginBottom:10,border:"1px solid "+C.border}},
                e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
                  e("div",null,
                    e("div",{style:{fontWeight:700,color:C.cream,fontSize:15}},c.cliente),
                    e("div",{style:{fontSize:12,color:C.textMuted}},c.estilista)
                  ),
                  e("div",{style:{textAlign:"right"}},
                    e("div",{style:{fontSize:14,fontWeight:700,color:C.accent}},c.hora),
                    e("div",{style:{fontSize:11,padding:"2px 8px",borderRadius:20,background:c.estado==="confirmada"?C.green+"30":c.estado==="cancelada"?C.red+"30":C.bgLight,color:c.estado==="confirmada"?C.green:c.estado==="cancelada"?C.red:C.textMuted,fontWeight:600,marginTop:2}},c.estado||"pendiente")
                  )
                ),
                e("div",{style:{fontSize:13,color:C.creamSoft,marginBottom:10}},(Array.isArray(c.servicios)?c.servicios.join(", "):c.servicio)||""),
                c.precio&&e("div",{style:{fontSize:13,color:C.accent,fontWeight:700,marginBottom:10}},"Q"+c.precio),
                e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                  e("button",{onClick:()=>cambEst(c.id,"confirmada"),style:{padding:"7px 10px",borderRadius:8,border:"none",background:C.green+"20",color:C.green,fontSize:11,fontWeight:700,cursor:"pointer"}},"✅ Confirmar"),
                  e("button",{onClick:()=>cambEst(c.id,"cancelada"),style:{padding:"7px 10px",borderRadius:8,border:"none",background:C.red+"20",color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}},"❌ Cancelar"),
                  e("a",{href:waMsg(c),target:"_blank",style:{padding:"7px 10px",borderRadius:8,background:"#25d36620",color:"#25d366",fontSize:11,fontWeight:700,textDecoration:"none"}},"📲 WA"),
                  isAdmin&&e("button",{onClick:async()=>{if(window.confirm("¿Eliminar esta cita?"))await deleteDoc(doc(db,"citas",c.id));},style:{padding:"7px 10px",borderRadius:8,border:"none",background:C.red+"15",color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}},"🗑️")
                )
              ))
        )
      : e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          e("input",{placeholder:"Nombre de la clienta",value:form.cliente,onChange:x=>setForm({...form,cliente:x.target.value}),style:inp}),
          e("input",{placeholder:"Teléfono (ej. 55551234)",value:form.telefono,onChange:x=>setForm({...form,telefono:x.target.value}),style:inp}),
          e("input",{type:"date",value:form.fecha,onChange:x=>setForm({...form,fecha:x.target.value}),style:inp}),
          e("select",{value:form.hora,onChange:x=>setForm({...form,hora:x.target.value}),style:inp},
            HORAS.map(h=>e("option",{key:h,value:h},h))),
          isAdmin&&e("select",{value:form.estilista,onChange:x=>setForm({...form,estilista:x.target.value}),style:inp},
            ESTS.map(s=>e("option",{key:s,value:s},s))),
          e("div",{style:{fontSize:12,fontWeight:700,color:C.textMuted,marginTop:6,letterSpacing:0.5,textTransform:"uppercase"}},"Servicios"),
          e("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
            SVCS.map(s=>e("button",{key:s,onClick:()=>toggleSvc(s),
              style:{padding:"9px 12px",borderRadius:8,border:"1px solid "+((form.servicios||[]).includes(s)?C.accent:C.border),
                background:(form.servicios||[]).includes(s)?C.accent+"20":C.bgCard,
                color:(form.servicios||[]).includes(s)?C.accent:C.textMuted,
                fontSize:12,fontWeight:600,cursor:"pointer"}},s))
          ),
          form.precio>0&&e("div",{style:{fontSize:14,color:C.accent,fontWeight:700,padding:"10px 14px",background:C.accent+"15",borderRadius:10}},"Total: Q"+form.precio),
          e("textarea",{placeholder:"Nota (opcional)",value:form.nota,onChange:x=>setForm({...form,nota:x.target.value}),rows:3,style:{...inp,resize:"none"}}),
          e("button",{onClick:guardarCita,style:{padding:15,borderRadius:12,border:"none",background:C.accent,color:C.bg,fontWeight:800,fontSize:15,cursor:"pointer",letterSpacing:0.5}},"Guardar Cita")
        )
  );

  // ── SECCIÓN CONFIRMACIONES ──
  const SecConfirmaciones = e("div",{style:{padding:16}},
    e("div",{style:{fontSize:12,color:C.textMuted,marginBottom:12,letterSpacing:0.5,textTransform:"uppercase",fontWeight:700}},"Citas del día siguiente — "+fmt(manana())),
    citasManana.length===0
      ? e("div",{style:{textAlign:"center",padding:40,color:C.textMuted,fontSize:14}},"Sin citas para mañana")
      : e("div",null,
          e("button",{
            onClick:()=>{
              citasManana.forEach((c,i)=>{
                setTimeout(()=>window.open(waMsg(c),"_blank"),i*800);
              });
            },
            style:{width:"100%",padding:14,borderRadius:12,border:"none",background:C.accent,color:C.bg,fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:16}
          },"📲 Enviar confirmaciones a todas ("+citasManana.length+")"),
          citasManana.map(c=>e("div",{key:c.id,style:{background:C.bgCard,padding:14,borderRadius:12,border:"1px solid "+C.border,marginBottom:10,borderLeft:"4px solid "+(COLORS[c.estilista]||C.border)}},
            e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
              e("div",null,
                e("div",{style:{fontWeight:700,color:C.cream}},c.cliente),
                e("div",{style:{fontSize:12,color:C.textMuted}},c.hora+" · "+c.estilista)
              ),
              e("div",{style:{fontSize:11,padding:"3px 8px",borderRadius:20,background:c.estado==="confirmada"?C.green+"30":c.estado==="cancelada"?C.red+"30":C.bgLight,color:c.estado==="confirmada"?C.green:c.estado==="cancelada"?C.red:C.textMuted,fontWeight:700,alignSelf:"flex-start"}},c.estado||"pendiente")
            ),
            // Historial de confirmaciones
            c.confirmaciones&&c.confirmaciones.length>0&&e("div",{style:{fontSize:11,color:C.textMuted,marginBottom:8}},
              c.confirmaciones.map((cf,i)=>e("div",{key:i},"• "+cf.hora+" — "+cf.estado))
            ),
            e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              e("a",{href:waMsg(c),target:"_blank",style:{padding:"8px 12px",borderRadius:8,background:"#25d36620",color:"#25d366",fontSize:12,fontWeight:700,textDecoration:"none"}},"📲 Confirmar"),
              e("button",{onClick:()=>cambEst(c.id,"confirmada"),style:{padding:"8px 10px",borderRadius:8,border:"none",background:C.green+"20",color:C.green,fontSize:11,fontWeight:700,cursor:"pointer"}},"✅"),
              e("button",{onClick:()=>cambEst(c.id,"cancelada"),style:{padding:"8px 10px",borderRadius:8,border:"none",background:C.red+"20",color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}},"❌"),
              e("button",{onClick:()=>cambEst(c.id,"reagendar"),style:{padding:"8px 10px",borderRadius:8,border:"none",background:C.accent+"20",color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer"}},"📅")
            )
          ))
        )
  );

  // ── SECCIÓN FIDELIDAD ──
  const [busqFid,setBusqFid]=useState("");
  const [nuevaNombre,setNuevaNombre]=useState("");
  const [nuevoTel,setNuevoTel]=useState("");
  const [mostrarNueva,setMostrarNueva]=useState(false);

  const fidFiltradas=fid.filter(f=>!busqFid||f.nombre?.toLowerCase().includes(busqFid.toLowerCase()));

  const SecFidelidad = e("div",{style:{padding:16}},
    e("input",{placeholder:"Buscar clienta...",value:busqFid,onChange:x=>setBusqFid(x.target.value),style:{...inp,marginBottom:12}}),
    e("button",{onClick:()=>setMostrarNueva(!mostrarNueva),style:{width:"100%",padding:12,borderRadius:10,border:"1px dashed "+C.border,background:"transparent",color:C.textMuted,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12}},
      mostrarNueva?"— Cancelar":"+ Nueva tarjeta"),
    mostrarNueva&&e("div",{style:{background:C.bgCard,padding:14,borderRadius:12,border:"1px solid "+C.border,marginBottom:12,display:"flex",flexDirection:"column",gap:10}},
      e("input",{placeholder:"Nombre de la clienta",value:nuevaNombre,onChange:x=>setNuevaNombre(x.target.value),style:inp}),
      e("input",{placeholder:"Teléfono",value:nuevoTel,onChange:x=>setNuevoTel(x.target.value),style:inp}),
      e("button",{onClick:async()=>{await crearTarjeta(nuevaNombre,nuevoTel);setNuevaNombre("");setNuevoTel("");setMostrarNueva(false);},
        style:{padding:12,borderRadius:10,border:"none",background:C.accent,color:C.bg,fontWeight:800,fontSize:14,cursor:"pointer"}},
        "Crear tarjeta")
    ),
    fidFiltradas.length===0
      ? e("div",{style:{textAlign:"center",padding:40,color:C.textMuted,fontSize:14}},"Sin tarjetas encontradas")
      : fidFiltradas.map(f=>{
          const estrellas=f.visitas%VPREMIO;
          const premios=f.premiosGanados||0;
          return e("div",{key:f.id,style:{background:C.bgCard,padding:14,borderRadius:12,border:"1px solid "+C.border,marginBottom:10}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              e("div",null,
                e("div",{style:{fontWeight:700,color:C.cream,fontSize:15}},f.nombre),
                e("div",{style:{fontSize:12,color:C.textMuted}},f.telefono||"")
              ),
              premios>0&&e("div",{style:{fontSize:12,padding:"4px 10px",borderRadius:20,background:C.accent+"30",color:C.accent,fontWeight:700}},premios+" premio"+(premios!==1?"s":""))
            ),
            // Barra de estrellas
            e("div",{style:{display:"flex",gap:4,marginBottom:10}},
              ...[...Array(VPREMIO)].map((_,i)=>e("div",{key:i,style:{fontSize:18}},i<estrellas?"⭐":"☆"))
            ),
            e("div",{style:{fontSize:12,color:C.textMuted,marginBottom:10}},estrellas+"/"+VPREMIO+" visitas"),
            e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
              e("button",{onClick:()=>regVisita(f),style:{padding:"8px 12px",borderRadius:8,border:"none",background:C.accent,color:C.bg,fontSize:12,fontWeight:800,cursor:"pointer"}},"+1 Visita"),
              e("button",{onClick:()=>restarVisita(f),style:{padding:"8px 10px",borderRadius:8,border:"none",background:C.bgLight,color:C.textMuted,fontSize:12,fontWeight:700,cursor:"pointer"}},"↩️"),
              premios>0&&e("button",{onClick:()=>canjear(f),style:{padding:"8px 12px",borderRadius:8,border:"none",background:C.green+"20",color:C.green,fontSize:12,fontWeight:700,cursor:"pointer"}},"🎁 Canjear"),
              isAdmin&&e("button",{onClick:()=>borrarTarjeta(f.id),style:{padding:"8px 10px",borderRadius:8,border:"none",background:C.red+"15",color:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}},"🗑️")
            )
          );
        })
  );

  const navItems=[
    {id:"agenda",ic:"📅",label:"Agenda"},
    {id:"confirmaciones",ic:"✅",label:"Confirmar"},
    {id:"fidelidad",ic:"⭐",label:"Fidelidad"},
  ];
  if(isAdmin) navItems.push({id:"admin",ic:"👑",label:"Admin"});

  return e("div",{style:{paddingBottom:72,maxWidth:480,margin:"0 auto",background:C.bg,minHeight:"100vh"}},
    Header,
    sec==="agenda"&&SecAgenda,
    sec==="confirmaciones"&&SecConfirmaciones,
    sec==="fidelidad"&&SecFidelidad,
    e("div",{className:"nav"},
      navItems.map(n=>e("button",{key:n.id,className:sec===n.id?"active":"",onClick:()=>setSec(n.id)},
        e("span",{className:"ic"},n.ic),n.label)
      )
    ),
    toast&&e("div",{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.col,color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:300,whiteSpace:"nowrap"}},toast.msg)
  );
}

const root=createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
